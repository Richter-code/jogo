<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo RPG Pixel Art</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="ui-panel">
            <div class="player-stats">
                <h3>Jogador</h3>
                <div class="stat">
                    <span>Vida:</span>
                    <div class="health-bar">
                        <div class="health-fill" id="healthBar"></div>
                    </div>
                    <span id="healthText">100/100</span>
                </div>
                <div class="stat">
                    <span>Nível:</span>
                    <span id="playerLevel">1</span>
                </div>
                <div class="stat">
                    <span>EXP:</span>
                    <span id="playerExp">0</span>
                </div>
            </div>
            <div class="inventory">
                <h3>Inventário</h3>
                <div class="inventory-grid" id="inventoryGrid">
                    <!-- Inventory slots will be generated by JS -->
                </div>
            </div>
        </div>
        
        <div class="game-area">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div class="controls-info">
                <p>Use WASD ou setas para mover • Espaço para interagir</p>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
